<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work in Progress</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f11;--border:#2a2a33;--text:#e8e8f0;--text2:#8888a0;--text3:#55556a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--text3);}
  .label{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
  h1{font-family:'DM Serif Display',serif;font-size:2.2rem;letter-spacing:-0.03em;color:var(--text2);font-style:italic;}
  p{font-size:0.88rem;color:var(--text3);font-weight:300;text-align:center;max-width:320px;line-height:1.7;}
  a{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text3);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:2px;transition:color 0.15s;}
  a:hover{color:var(--text2);}
</style>
</head>
<body>
  <div class="dot"></div>
  <div class="label">Work in progress</div>
  <h1>Work In Progress.</h1>
  <p>Rafi will update this page with exercises and notes in the future.</p>
  <a href="index.html">← Back to Study Hub</a>
</body>
</html>
